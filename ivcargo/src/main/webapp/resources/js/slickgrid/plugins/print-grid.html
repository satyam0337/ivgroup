/* THE FOLLOWING CSS IS REQUIRED AND SHOULD NOT BE MODIFIED. */
div.fauxRow {
	display: inline-block;
	vertical-align: top;
	width: 100%;

.noBreak {
	float: right;
	width: 100%;
	visibility: hidden;
}

.noBreak:before, .noBreak:after {
	display: block;
	content: "";
}

.noBreak:after {
	margin-top: -594mm;
}

.noBreak>div {
	display: inline-block;
	vertical-align: top;
	width: 100%;
	page-break-inside: avoid;
}
/*table.print > thead {white-space: nowrap;}*/

/* THE FOLLOWING CSS IS REQUIRED, but the values may be adjusted. */

table.fauxRow, table.print {
	font-size: 14px;
	line-height: 20px;
}

/* THE FOLLOWING CSS IS OPTIONAL. */
body {
	counter-reset: t1;
} /* Delete to remove row numbers. */

	text-align: right;

}

<script>
	function applyColumnPicker() {
		$(function() {
			var $chk = $("#grpChkBox input:checkbox");
			var $tbl = $("#table");
			var cell = $tbl.find(".slick-cell-checkboxsel");
			cell.remove();
			//$chk.prop('checked', true);
			
			$chk.each(function() {
				showHideColumns($tbl, $(this).attr("name"), $(this).attr('id'), $(this).attr("checked") == 'checked');
			});
			
			$chk.click(function() {
				/*
					For Show hide columns	
				*/
				showHideColumns($tbl, $(this).attr("name"), $(this).attr('id'), $(this).is(":checked"));
				
				if($(this).is(":checked"))
					$(this).attr("checked", "checked");
				else
					$(this).removeAttr("checked");
			});
		});
	}
	
	function showHideColumns(table, name, id, checked) {
		if(name != undefined && name != "") {
			var colToHide = table.find("." + name);
			
			if(id == 'showHide_' + name) {
				if(checked) {
					$(colToHide).show();
					$("[data-cell='" + name + "']").removeClass('remove');
					$("[data-selector='" + name + "']").removeClass('remove');
				} else {
					$(colToHide).hide();
					$("[data-cell='" + name + "']").addClass('remove');
					$("[data-selector='" + name + "']").addClass('remove');
				}
			}
		}
	}
	
	function showHideSummary(id) {
		if($('#' + id).prop('checked')) {
			$("*[data-id='" + id + "']").show();
			$("*[data-id='" + id + "']").removeClass('remove');
		} else {
			$("*[data-id='" + id + "']").hide();
			$("*[data-id='" + id + "']").addClass('remove');
		}
	}
</script>

function applyPrintSetting() {

function applyPrintSettingPlainPrint() {
	document.getElementById("table").border=0;
	applyPrintSetting();
}

function removeClassAndStyle() {
	var $table = $("#table");

	// 1️⃣ Loop through each <td> and <th> to capture one style and remove it
	$table.find("td:visible, th:visible").each(function () {
		var $this = $(this);

		// Define the class(es) you want to keep
		var keepClass = 'truncate';

		// Remove all classes except the one you want to keep
		$this.removeClass(function (i, cls) {
			return cls.split(' ').filter(c => c !== keepClass).join(' ');
		});
	});
}

function changeWidth(column) {
	var selector	= column.name;
	var value		= column.value+"%;"
	$("[data-selector='"+selector+"']").attr("style","width:"+value+"background-color: lightblue;");
	
	if($('#showHide_' + selector).attr("checked") == 'checked' || $('#showHide_' + selector).prop("checked")) 
		$("[data-selector='"+selector+"']").show()
	else
		$("[data-selector='"+selector+"']").hide();
}

function exportDataToExcel() {
	var dt		= new Date();
	var day		= dt.getDate();
	var month	= dt.getMonth() + 1;
	var year	= dt.getFullYear();
	var hour	= dt.getHours();
	var mins	= dt.getMinutes();
	var seconds = dt.getSeconds();
	
	$('.remove').remove();
	let branchName 		= $('#branchName').html();
	let regionName 		= $('#regionName').html();
	let subRegionName	= $('#subRegionName').html();
	
	var header		= ($('#header').html()).replaceAll('<b>', '').replaceAll('</b>', '').replaceAll(' ', '_').replaceAll('&nbsp;', '_');
	var fileName	= day + "_" + month + "_" + year + "_" + hour + "_" + mins + "_" + seconds;
	
	$('#chromeTable td').each(function() {
		var cellText = $(this).text();
		if (cellText.includes('/')) {
			$(this).attr('data-type', 'text');
			$(this).attr('style', 'mso-number-format:"\@"');  // Apply Excel's text format
		}
	});
	var htmlTable	= $('#chromeTable').html();
	
	var element = document.createElement('a');
	element.setAttribute('href', 'data:application/vnd.ms-excel,' + encodeURIComponent(htmlTable));
	
	if(branchName != undefined && branchName != '' && branchName != 'ALL')
		element.setAttribute('download', header + '_branch_' + branchName + "_" + fileName);
	else if(regionName != undefined && regionName != '' && regionName != 'ALL')
		element.setAttribute('download', header + '_region_' + regionName + "_" + fileName);
	else if(subRegionName != undefined && subRegionName != '' && subRegionName != 'ALL')
		element.setAttribute('download', header + '_area_' + subRegionName + "_" + fileName);
	else
		element.setAttribute('download', header + "_" + fileName);
	
	element.style.display = 'none';
	
	document.body.appendChild(element);
	element.click();
	document.body.removeChild(element);
	//window.open('data:application/vnd.ms-excel,' + encodeURIComponent(document.getElementById('chromeTable').innerHTML));
   
	setTimeout(() => {
		 window.close();
	}, 1000);
}

function changeLineType(checkBox) {
	var selector	= checkBox.id;
	
	if($('#' + selector).is(":checked"))
		$("[data-cell='" + selector + "']").addClass('truncate');
	else
		$("[data-cell='" + selector + "']").removeClass('truncate');
}
</script>
<script>		
function chromePrinter(){
  (function() { // THIS FUNCTION IS REQUIRED.
	 if(/Firefox|MSIE |Trident/i.test(navigator.userAgent))
	  var formatForPrint = function(table) {
		var noBreak = document.createElement("div")
		  , noBreakTable = noBreak.appendChild(document.createElement("div")).appendChild(table.cloneNode())
		  , tableParent = table.parentNode
		  , tableParts = table.children
		  , partCount = tableParts.length
		  , partNum = 0
		  , cell = table.querySelector("tbody > tr > td");
		noBreak.className = "noBreak";
		for(; partNum < partCount; partNum++) {
		  if(!/tbody/i.test(tableParts[partNum].tagName))
			noBreakTable.appendChild(tableParts[partNum].cloneNode(true));
		}
		if(cell) {
		  noBreakTable.appendChild(cell.parentNode.parentNode.cloneNode()).appendChild(cell.parentNode.cloneNode(true));
		  if(!table.tHead) {
			var borderRow = document.createElement("tr");
			borderRow.appendChild(document.createElement("th")).colSpan="1000";
			borderRow.className = "borderRow";
			table.insertBefore(document.createElement("thead"), table.tBodies[0]).appendChild(borderRow);
		  }
		}
		tableParent.insertBefore(document.createElement("div"), table).style.paddingTop = ".009px";
		tableParent.insertBefore(noBreak, table);
	  };
	else
	  var formatForPrint = function(table) {
		var tableParent = table.parentNode
		  , cell = table.querySelector("tbody > tr > td");
		if(cell) {
		  var topFauxRow = document.createElement("table")
			, fauxRowTable = topFauxRow.insertRow(0).insertCell(0).appendChild(table.cloneNode())
			, colgroup = fauxRowTable.appendChild(document.createElement("colgroup"))
			, headerHider = document.createElement("div")
			, metricsRow = document.createElement("tr")
			, cells = cell.parentNode.cells
			, cellNum = cells.length
			, colCount = 0
			, tbods = table.tBodies
			, tbodCount = tbods.length
			, tbodNum = 0
			, tbod = tbods[0];
		  for(; cellNum--; colCount += cells[cellNum].colSpan);
		  for(cellNum = colCount; cellNum--; metricsRow.appendChild(document.createElement("td")).style.padding = 0);
		  cells = metricsRow.cells;
		  tbod.insertBefore(metricsRow, tbod.firstChild);
		  for(; ++cellNum < colCount; colgroup.appendChild(document.createElement("col")).style.width = cells[cellNum].offsetWidth + "px");
		  var borderWidth = metricsRow.offsetHeight;
		  metricsRow.className = "metricsRow";
		  borderWidth -= metricsRow.offsetHeight;
		  tbod.removeChild(metricsRow);
		  tableParent.insertBefore(topFauxRow, table).className = "fauxRow";
		  if(table.tHead)
			fauxRowTable.appendChild(table.tHead);
		  var fauxRow = topFauxRow.cloneNode(true)
			, fauxRowCell = fauxRow.rows[0].cells[0];
		  fauxRowCell.insertBefore(headerHider, fauxRowCell.firstChild).style.marginBottom = -fauxRowTable.offsetHeight - borderWidth + "px";
		  if(table.caption)
			fauxRowTable.insertBefore(table.caption, fauxRowTable.firstChild);
		  if(tbod.rows[0])
			fauxRowTable.appendChild(tbod.cloneNode()).appendChild(tbod.rows[0]);
		  for(; tbodNum < tbodCount; tbodNum++) {
			tbod = tbods[tbodNum];
			rows = tbod.rows;
			for(; rows[0]; tableParent.insertBefore(fauxRow.cloneNode(true), table).rows[0].cells[0].children[1].appendChild(tbod.cloneNode()).appendChild(rows[0]));
		  }
		  tableParent.removeChild(table);
		}
		else
		  tableParent.insertBefore(document.createElement("div"), table).appendChild(table).parentNode.className="fauxRow";
	  };
	var tables = document.body.querySelectorAll("table.print")
	  , tableNum = tables.length;
	for(; tableNum--; formatForPrint(tables[tableNum]));
  }
  )();
}
</script>
